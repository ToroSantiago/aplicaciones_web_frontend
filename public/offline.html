<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essenza Royale - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .offline-container {
      text-align: center;
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      color: #333;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }
    p {
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .cached-content {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .cached-content h3 {
      color: #333;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .cached-list {
      font-size: 0.85rem;
      color: #666;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.3s;
    }
    button:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No tienes conexión a internet. Algunas funciones estarán limitadas, pero puedes navegar el contenido en caché.</p>
    
    <div class="cached-content">
      <h3>✓ Disponible sin conexión:</h3>
      <div class="cached-list">
        <p>• Catálogo de perfumes (último cargado)</p>
        <p>• Carrito (se sincronizará cuando vuelva la conexión)</p>
        <p>• Tus compras anteriores</p>
      </div>
    </div>

    <button onclick="window.location.href='/'">
      Volver al inicio
    </button>
  </div>
</body>
</html>
